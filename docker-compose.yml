services:
  postgres:
    image: postgres:16
    container_name: ledgerflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ledgerflow
      POSTGRES_PASSWORD: ledgerflow
      POSTGRES_DB: ledgerflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
